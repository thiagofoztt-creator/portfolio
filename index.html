<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
        rel="stylesheet">

    <title>Thiago - Gerador de IA</title>
</head>

<body>

    <h1>CSS <strong>Thiago</strong> Gerador <span>com IA</span></h1>

    <p>Descreva o que você imagina e veja a mágica acontecer</p>

    <textarea
        id="descricao"
        rows="3"
        class="caixa-texto"
        placeholder="Ex: Pessa um codigo"></textarea>

    <button class="botao-gerar">Gerar código ⚡</button>

    <div class="resultados">

        <div class="coluna">
            <h2>Código</h2>

            <div class="container-codigo">
                <button class="botao-copiar">Copiar 📋</button>
                <pre class="bloco-codigo"></pre>
            </div>
        </div>

        <div class="coluna">
            <h2>Preview</h2>
            <iframe class="resultado-codigo" title="Preview do código gerado"></iframe>
        </div>

    </div>

    <script src="scripts.js"></script>

</body>

</html>
